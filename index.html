<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Amber · Allergy Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- 登录页面 -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-icon">🐱</div>
      <h1 class="login-title">Amber 过敏记录</h1>
      <p class="login-hint">请使用授权的 Google 账号登录</p>
      <button id="google-login-btn" class="btn btn-primary login-btn">
        <svg width="18" height="18" viewBox="0 0 48 48" style="vertical-align:middle;margin-right:8px"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.9 7.35 2.56 10.53l7.97-5.94z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.94C6.51 42.62 14.62 48 24 48z"/></svg>
        Google 登录
      </button>
      <div id="login-error" class="login-error"></div>
    </div>
  </div>

  <!-- 应用主体（登录后显示） -->
  <div id="app-shell" style="display:none">

  <!-- 顶部状态栏 -->
  <header class="top-bar">
    <div class="top-bar-left">
      <img src="amber.jpg" alt="Amber葵头像" class="top-bar-avatar">
      <div class="top-bar-title"><span id="top-bar-name">Amber葵</span> <span id="top-bar-breed">金渐层</span></div>
    </div>
    <div class="top-bar-actions">
      <button class="top-bar-btn" onclick="exportJSON()">导出</button>
      <button class="top-bar-btn" id="logout-btn" onclick="handleLogout()">登出</button>
    </div>
  </header>

  <!-- 状态条 -->
  <div class="status-strip" id="overview-bar">
    <div class="status-item"><span class="status-label">阶段</span><span class="status-value">—</span></div>
    <div class="status-item"><span class="status-label">天数</span><span class="status-value">—</span></div>
    <div class="status-item"><span class="status-label">环孢素</span><span class="status-value">—</span></div>
    <div class="status-item"><span class="status-label">日志</span><span class="status-value">0</span></div>
  </div>

  <!-- 主内容 -->
  <main class="main-content" id="main-content"></main>

  <!-- 底部导航 -->
  <nav class="bottom-nav" id="bottom-nav">
    <a class="nav-tab active" data-view="daily" href="#">
      <span class="nav-tab-icon">📝</span>记录
    </a>
    <a class="nav-tab" data-view="medication" href="#">
      <span class="nav-tab-icon">💊</span>用药
    </a>
    <a class="nav-tab" data-view="trends" href="#">
      <span class="nav-tab-icon">📈</span>趋势
    </a>
    <a class="nav-tab" data-view="overview" href="#">
      <span class="nav-tab-icon">📋</span>概览
    </a>
    <a class="nav-tab" data-view="more" href="#">
      <span class="nav-tab-icon">···</span>更多
    </a>
  </nav>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  </div><!-- end app-shell -->

  <!-- Firebase SDK (CDN) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, signOut, onAuthStateChanged, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDgvwldkipc0rqKfYDqDEWxRnCzk6Ur2lo",
      authDomain: "amber-kui.firebaseapp.com",
      projectId: "amber-kui",
      storageBucket: "amber-kui.firebasestorage.app",
      messagingSenderId: "157220123769",
      appId: "1:157220123769:web:b1ecd814dd2ae5dc3150a8",
      measurementId: "G-QFCFK98MKR"
    };

    const ALLOWED_EMAIL = 'yaoyaoyuan@gmail.com';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const DOC_REF = doc(db, "trackers", "amber-kui");

    // Expose to app.js
    window._firebase = { db, DOC_REF, setDoc, getDoc, onSnapshot };
    window._auth = { auth, signInWithPopup, signOut, onAuthStateChanged, GoogleAuthProvider, ALLOWED_EMAIL };
    window.dispatchEvent(new Event('firebase-ready'));
  </script>

  <script src="app.js"></script>
</body>
</html>
